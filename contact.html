<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroMovie | Numérisation VHS de Qualité</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Styles spécifiques pour agrandir le logo image */
        header .logo img {
            height: 80px; /* Augmenté de 60px à 80px pour un logo plus grand */
            width: auto;
            display: block;
            transition: transform 0.5s ease; /* Optionnel : petit effet au survol */
        }
        
        header .logo img:hover {
            transform: scale(1.2); /* Optionnel : le logo grossit légèrement au survol */
        }
        
        .logo-link {
            text-decoration: none;
        }

        /* Ajustement de la navigation si le logo est très grand */
        header {
            padding: 0px 60px; /* Réduction du padding vertical pour compenser la taille du logo */
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo-link">
        <div class="logo">
            <img src="logo.png" alt="RetroMovie Logo">
        </div>
    </a>
    
    <div class="menu-burger" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <nav id="nav-links">
        <a href="index.html#services" onclick="toggleMenu()">Services</a>
        <a href="index.html#pricing" onclick="toggleMenu()">Tarifs</a>
        <a href="index.html#about" onclick="toggleMenu()">À propos</a>
        <a href="contact.html" onclick="toggleMenu()">Contact</a>
    </nav>
</header>

<section class="contact visible" style="margin-top: 100px; background: white;">
    <h2>Contactez-nous</h2>
    <p style="text-align:center; margin-bottom:40px;">Une question ? Un devis ? Envoyez-nous un message !</p>

    <form action="send_mail.php" method="POST" style="max-width:600px; margin:auto; display:flex; flex-direction:column; gap:15px;">
        <label>Nom complet</label>
        <input type="text" name="name" style="padding:12px; border-radius:5px; border:1px solid #ccc;" required>
        
        <label>Email</label>
        <input type="email" name="email" style="padding:12px; border-radius:5px; border:1px solid #ccc;" required>
        
        <label>Message</label>
        <textarea name="message" rows="5" style="padding:12px; border-radius:5px; border:1px solid #ccc;" required></textarea>
        
        <button type="submit" class="btn">Envoyer ma demande</button>
    </form>
</section>

<footer>
    <p>© 2026 RetroMovie - Service de numérisation VHS</p>
</footer>

<script src="script.js"></script>
</body>
</html>
